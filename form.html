<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機器借用系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .container { width: 100%; max-width: 480px; }
  .header { text-align: center; margin-bottom: 20px; }
  .mode-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .mode-badge.borrow { background: #e8f5e9; color: #2e7d32; }
  .mode-badge.return { background: #e3f2fd; color: #1565c0; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }

  /* 機器總表 */
  .status-table-card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 16px;
  }
  .status-table-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 12px; }
  .machine-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .machine-row:last-child { border-bottom: none; }
  .machine-name { font-weight: 600; color: #1a1a1a; }
  .machine-info { font-size: 12px; color: #888; margin-top: 2px; }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .badge-available { background: #e8f5e9; color: #2e7d32; }
  .badge-borrowed { background: #fff3e0; color: #e65100; }

  /* 載入動畫 */
  .loading-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 0;
    font-size: 13px;
    color: #aaa;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #e0e0e0;
    border-top-color: #43a047;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 16px;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }
  .field label .required { color: #e53935; margin-left: 2px; }
  .field label .optional { color: #aaa; font-weight: 400; font-size: 12px; margin-left: 4px; }
  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafafa;
    transition: border-color 0.2s;
    appearance: none;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { outline: none; border-color: #4caf50; background: #fff; }
  .field textarea { resize: vertical; min-height: 80px; }
  .location-other { margin-top: 8px; display: none; }
  .radio-group { display: flex; gap: 12px; }
  .radio-option {
    flex: 1;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #444;
    transition: all 0.2s;
    background: #fafafa;
    user-select: none;
  }
  .radio-option input[type="radio"] { display: none; }
  .radio-option.selected { border-color: #1976d2; background: #e3f2fd; color: #1565c0; font-weight: 600; }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s, opacity 0.2s;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.98); }
  .btn.borrow { background: #43a047; color: white; }
  .btn.borrow:hover { background: #388e3c; }
  .btn.return { background: #1976d2; color: white; }
  .btn.return:hover { background: #1565c0; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .btn:disabled .btn-spinner { display: block; }
  .info-box {
    background: #f9f9f9;
    border: 1px solid #ebebeb;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #888;
    line-height: 1.8;
    margin-top: 8px;
  }
  .success-screen { text-align: center; padding: 32px 0 16px; }
  .success-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
  }
  .success-icon.borrow { background: #e8f5e9; }
  .success-icon.return { background: #e3f2fd; }
  .success-screen h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .success-screen p { font-size: 14px; color: #666; line-height: 1.6; }
  .error-msg { color: #e53935; font-size: 12px; margin-top: 4px; display: none; }
  .field.error input, .field.error select { border-color: #e53935; }
  .field.error .error-msg { display: block; }
  .timestamp-note { text-align: center; font-size: 11px; color: #bbb; margin-top: 8px; }
  .name-other { margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="mode-badge" id="modeBadge">讀取中...</div>
    <h1 id="pageTitle">機器借用系統</h1>
    <p id="pageSubtitle"></p>
  </div>

  <!-- 機器總表（借用模式才顯示） -->
  <div class="status-table-card" id="statusTableCard" style="display:none;">
    <div class="status-table-title">📋 機器目前狀態</div>
    <div id="statusTableBody">
      <div class="loading-row"><div class="spinner"></div>載入中...</div>
    </div>
  </div>

  <!-- 表單 -->
  <div class="card" id="formCard">
    <div id="formContent"></div>
    <div class="timestamp-note" id="timestampNote"></div>
  </div>

  <!-- 成功畫面 -->
  <div class="card" id="successCard" style="display:none;">
    <div class="success-screen" id="successScreen"></div>
  </div>

</div>
<script>
// ============================================================
// 設定區
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDLfP46PMA2nZ0pRDEf71ECtzWyueyawidd6hEC_HKmClEIBJf_mo2HkhOdzKwq--V5Q/exec';


const MACHINES = [
  'Konica 1',
  'Konica 2',
  'CVS 1',
];

const LOCATIONS = [
  'OPD',
  'Cathroom',
  'OR-21',
  'OR-22',
  'OR-45',
  '放射科',
  'CVCU',
  '其他',
];
// 人員名單
const STAFF = [
  '康銘元', '游茱棱', '吳詠斯', '李修安', '黃暄喬',
  '劉濟興', '郭家誠', '魏晧智', '蔡忠霖', '王中琦',
  '何奇恩', '陳佩琳', '陳映晴', '陳冠樺', '林幸儀',
  '許育綾', '李乙仙', '鍾翔仁',
];
// ============================================================

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode');
const now = new Date();
let isSubmitting = false; // 防重複送出

function formatDate(d) { return d.toISOString().slice(0,10); }
function formatTime(d) { return d.toTimeString().slice(0,5); }
function formatDateTime(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${formatTime(d)}`;
}
function genLoanId() {
  return `BRW-${formatDate(now).replace(/-/g,'')}-${Math.floor(Math.random()*9000+1000)}`;
}

// 無效連結
if (mode !== 'borrow' && mode !== 'return') {
  document.getElementById('modeBadge').textContent = '錯誤';
  document.getElementById('pageTitle').textContent = '無效的連結';
  document.getElementById('formCard').innerHTML = '<p style="color:#e53935;font-size:14px;padding:8px 0;">此連結不正確，請重新掃描正確的 QR Code。</p>';
  throw new Error('invalid mode');
}

// ============================================================
// LIFF 初始化（自動抓取 LINE 名稱）
// ============================================================
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID[mode] });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      const nameInput = document.getElementById('borrowerName') || document.getElementById('returnerName');
      if (nameInput && !nameInput.value) {
        nameInput.value = profile.displayName;
      }
    } else {
      liff.login();
    }
  } catch(e) {
    console.log('LIFF 初始化失敗，使用一般模式：', e.message);
  }
}

// 初始化頁面
if (mode === 'borrow') {
  document.getElementById('modeBadge').textContent = '借用登記';
  document.getElementById('modeBadge').className = 'mode-badge borrow';
  document.getElementById('pageTitle').textContent = '機器借用表單';
  document.getElementById('pageSubtitle').textContent = '請確認機器狀態後填寫借用資訊';
  document.title = '機器借用表單';
  document.getElementById('statusTableCard').style.display = 'block';
  loadMachineStatus();
} else {
  document.getElementById('modeBadge').textContent = '歸還登記';
  document.getElementById('modeBadge').className = 'mode-badge return';
  document.getElementById('pageTitle').textContent = '機器歸還表單';
  document.getElementById('pageSubtitle').textContent = '選擇機器並填寫姓名即可歸還';
  document.title = '機器歸還表單';
}

document.getElementById('timestampNote').textContent =
  `掃描時間：${formatDateTime(now)}（系統自動記錄）`;

// ============================================================
// 機器總表
// ============================================================
async function loadMachineStatus() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=status`, {
      signal: AbortSignal.timeout(6000)
    });
    const data = await res.json();
    if (data.ok && data.machines) {
      renderStatusTable(MACHINES.map(m => {
        const info = data.machines[m];
        return info && info.status === '借出中'
          ? { machine: m, status: '借出中', borrowerName: info.actualUser || info.borrowerName, location: info.location }
          : { machine: m, status: '可借用' };
      }));
      return;
    }
  } catch(e) {
    console.log('載入機器狀態失敗：', e.message);
  }
  // 載入失敗顯示提示
  document.getElementById('statusTableBody').innerHTML =
    '<div class="loading-row" style="color:#e65100;">⚠ 無法載入狀態，請重新整理</div>';
}

function renderStatusTable(rows) {
  document.getElementById('statusTableBody').innerHTML = rows.map(r => `
    <div class="machine-row">
      <div>
        <div class="machine-name">${r.machine}</div>
        ${r.status === '借出中' ? `<div class="machine-info">借用人：${r.borrowerName}　地點：${r.location}</div>` : ''}
      </div>
      <span class="badge ${r.status === '可借用' ? 'badge-available' : 'badge-borrowed'}">${r.status}</span>
    </div>
  `).join('');
}

// ============================================================
// 借用表單
// ============================================================
function renderBorrowForm() {
  const machineOptions = MACHINES.map(m => `<option value="${m}">${m}</option>`).join('');
  const locationOptions = LOCATIONS.map(l => `<option value="${l}">${l}</option>`).join('');
  const staffOptions = STAFF.map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('formContent').innerHTML = `
    <div class="field" id="f-name">
      <label>借用人姓名 <span class="required">*</span></label>
      <select id="borrowerName" onchange="handleNameChange('borrowerName','borrowerNameOther')">
        <option value="">請選擇姓名</option>
        ${staffOptions}
        <option value="其他">其他（手動輸入）</option>
      </select>
      <div class="name-other" id="borrowerNameOther">
        <input type="text" id="borrowerNameInput" placeholder="請輸入姓名">
      </div>
      <div class="error-msg">請填寫姓名</div>
    </div>
    <div class="field">
      <label>實際使用人 <span class="optional">（代借時填寫）</span></label>
      <select id="actualUser" onchange="handleNameChange('actualUser','actualUserOther')">
        <option value="">若本人使用請留空</option>
        ${staffOptions}
        <option value="其他">其他（手動輸入）</option>
      </select>
      <div class="name-other" id="actualUserOther">
        <input type="text" id="actualUserInput" placeholder="請輸入姓名">
      </div>
    </div>
    <div class="field" id="f-machine">
      <label>借用機器 <span class="required">*</span></label>
      <select id="machineSelect">
        <option value="">請選擇機器</option>
        ${machineOptions}
      </select>
      <div class="error-msg">請選擇機器</div>
    </div>
    <div class="field" id="f-borrow-type">
      <label>操作類型 <span class="required">*</span></label>
      <div class="radio-group">
        <label class="radio-option selected" id="opt-new" onclick="selectBorrowType('new')">
          <input type="radio" name="borrowType" value="new" checked> 新借用
        </label>
        <label class="radio-option" id="opt-transfer-borrow" onclick="selectBorrowType('transfer')">
          <input type="radio" name="borrowType" value="transfer"> 轉借
        </label>
      </div>
    </div>
    <div class="field" id="f-location">
      <label>借用地點 <span class="required">*</span></label>
      <select id="locationSelect" onchange="handleLocationChange()">
        <option value="">請選擇地點</option>
        ${locationOptions}
      </select>
      <div class="location-other" id="locationOther">
        <input type="text" id="locationOtherInput" placeholder="請輸入地點名稱">
      </div>
      <div class="error-msg">請選擇或填寫地點</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="field">
        <label>借用日期</label>
        <input type="date" id="borrowDate" value="${formatDate(now)}" readonly style="color:#888;">
      </div>
      <div class="field">
        <label>借用時間</label>
        <input type="time" id="borrowTime" value="${formatTime(now)}" readonly style="color:#888;">
      </div>
    </div>
    <div class="field">
      <label>備註 <span class="optional">（選填）</span></label>
      <textarea id="borrowNote" placeholder="地點補充或用途說明"></textarea>
    </div>
    <div class="info-box">
      ・借出中的機器無法重複借用<br>
      ・掃描時間已由系統自動記錄
    </div>
    <br>
    <button class="btn borrow" id="borrowBtn" onclick="submitBorrow()">
      <div class="btn-spinner"></div>
      確認借用
    </button>
  `;
}

function handleNameChange(selectId, otherId) {
  const sel = document.getElementById(selectId).value;
  document.getElementById(otherId).style.display = sel === '其他' ? 'block' : 'none';
}

function handleLocationChange() {
  const sel = document.getElementById('locationSelect').value;
  document.getElementById('locationOther').style.display = sel === '其他' ? 'block' : 'none';
}

function selectBorrowType(val) {
  document.getElementById('opt-new').classList.toggle('selected', val === 'new');
  document.getElementById('opt-transfer-borrow').classList.toggle('selected', val === 'transfer');
}

async function submitBorrow() {
  if (isSubmitting) return; // 防重複送出

  const borrowerSel = document.getElementById('borrowerName').value;
  const name = borrowerSel === '其他'
    ? document.getElementById('borrowerNameInput').value.trim()
    : borrowerSel;
  const machine = document.getElementById('machineSelect').value;
  const locationSel = document.getElementById('locationSelect').value;
  const locationOther = document.getElementById('locationOtherInput')?.value.trim() || '';
  const location = locationSel === '其他' ? locationOther : locationSel;

  let valid = true;
  [['f-name', name], ['f-machine', machine], ['f-location', location]].forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val) { el.classList.add('error'); valid = false; }
    else el.classList.remove('error');
  });
  if (!valid) return;

  // 開始送出
  isSubmitting = true;
  const btn = document.getElementById('borrowBtn');
  btn.disabled = true;
  btn.querySelector('.btn-spinner').style.display = 'block';
  btn.childNodes[btn.childNodes.length - 1].textContent = ' 送出中...';

  const borrowType = document.querySelector('input[name="borrowType"]:checked')?.value || 'new';
  const loanId = genLoanId();
  const actualUser = document.getElementById('actualUser').value.trim();

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: borrowType === 'transfer' ? 'transfer' : 'borrow',
        loanId,
        borrowerName: name,
        actualUser,
        machine, location,
        transferLocation: location,
        returnerName: name,
        borrowDate: formatDate(now),
        borrowTime: formatTime(now),
        note: document.getElementById('borrowNote').value.trim(),
        scanTimestamp: now.toISOString(),
      }),
      mode: 'no-cors',
    });
  } catch(e) {}

  const isTransfer = borrowType === 'transfer';
  document.getElementById('statusTableCard').style.display = 'none';
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
  document.getElementById('successScreen').innerHTML = `
    <div class="success-icon borrow">${isTransfer ? '🔄' : '✅'}</div>
    <h2>${isTransfer ? '轉借登記成功！' : '借用登記成功！'}</h2>
    <div class="info-box" style="margin-top:20px;text-align:left;">
      ${isTransfer ? '轉借人' : '借用人'}：${name}<br>
      ${actualUser ? '實際使用人：' + actualUser + '<br>' : ''}
      機器：${machine}<br>
      地點：${location}<br>
      時間：${formatDateTime(now)}
    </div>
    <p style="font-size:12px;color:#bbb;margin-top:16px;">歸還時請掃描歸還 QR Code</p>
  `;
}

// ============================================================
// 歸還表單
// ============================================================
function renderReturnForm() {
  const machineOptions = MACHINES.map(m => `<option value="${m}">${m}</option>`).join('');
  const staffOptions = STAFF.map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('formContent').innerHTML = `
    <div class="field" id="f-rmachine">
      <label>歸還機器 <span class="required">*</span></label>
      <select id="returnMachineSelect">
        <option value="">請選擇機器</option>
        ${machineOptions}
      </select>
      <div class="error-msg">請選擇機器</div>
    </div>
    <div class="field" id="f-rname">
      <label>歸還人姓名 <span class="required">*</span></label>
      <select id="returnerName" onchange="handleNameChange('returnerName','returnerNameOther')">
        <option value="">請選擇姓名</option>
        ${staffOptions}
        <option value="其他">其他（手動輸入）</option>
      </select>
      <div class="name-other" id="returnerNameOther">
        <input type="text" id="returnerNameInput" placeholder="請輸入姓名">
      </div>
      <div class="error-msg">請填寫姓名</div>
    </div>
    <div class="field" id="f-condition">
      <label>機器狀態 <span class="required">*</span></label>
      <div class="radio-group">
        <label class="radio-option selected" id="opt-good" onclick="selectCondition('good')">
          <input type="radio" name="condition" value="good" checked> 正常
        </label>
        <label class="radio-option" id="opt-issue" onclick="selectCondition('issue')">
          <input type="radio" name="condition" value="issue"> 有問題
        </label>
      </div>
    </div>
    <div class="field" id="f-issue-note" style="display:none;">
      <label>問題說明 <span class="required">*</span></label>
      <textarea id="issueNote" placeholder="請描述機器狀況"></textarea>
    </div>
    <div class="field">
      <label>備註 <span class="optional">（選填）</span></label>
      <textarea id="returnNote" placeholder="其他說明"></textarea>
    </div>
    <div class="info-box">
      ・歸還時間由系統自動記錄<br>
      ・若機器有損壞請務必如實填寫
    </div>
    <br>
    <button class="btn return" id="returnBtn" onclick="submitReturn()">
      <div class="btn-spinner"></div>
      確認歸還
    </button>
  `;
}

function selectCondition(val) {
  document.getElementById('opt-good').classList.toggle('selected', val === 'good');
  document.getElementById('opt-issue').classList.toggle('selected', val === 'issue');
  document.getElementById('f-issue-note').style.display = val === 'issue' ? 'block' : 'none';
}

async function submitReturn() {
  if (isSubmitting) return; // 防重複送出

  const machine = document.getElementById('returnMachineSelect').value;
  const returnerSel = document.getElementById('returnerName').value;
  const name = returnerSel === '其他'
    ? document.getElementById('returnerNameInput').value.trim()
    : returnerSel;
  const condition = document.querySelector('input[name="condition"]:checked')?.value || 'good';
  const issueNote = document.getElementById('issueNote')?.value.trim() || '';

  let valid = true;
  if (!machine) { document.getElementById('f-rmachine').classList.add('error'); valid = false; }
  else document.getElementById('f-rmachine').classList.remove('error');
  if (!name) { document.getElementById('f-rname').classList.add('error'); valid = false; }
  else document.getElementById('f-rname').classList.remove('error');
  if (!valid) return;

  // 開始送出
  isSubmitting = true;
  const btn = document.getElementById('returnBtn');
  btn.disabled = true;
  btn.querySelector('.btn-spinner').style.display = 'block';
  btn.childNodes[btn.childNodes.length - 1].textContent = ' 送出中...';

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'return',
        machine, returnerName: name, condition, issueNote,
        returnNote: document.getElementById('returnNote').value.trim(),
        returnTimestamp: now.toISOString(),
      }),
      mode: 'no-cors',
    });
  } catch(e) {}

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
  document.getElementById('successScreen').innerHTML = `
    <div class="success-icon return">📦</div>
    <h2>歸還登記成功！</h2>
    <p>感謝您歸還，機器狀態已更新</p>
    <div class="info-box" style="margin-top:20px;text-align:left;">
      歸還人：${name}<br>
      機器：${machine}<br>
      機器狀態：${condition === 'good' ? '正常' : '有問題（已通知管理員）'}<br>
      時間：${formatDateTime(now)}
    </div>
  `;
}

// 初始化
if (mode === 'borrow') renderBorrowForm();
else renderReturnForm();



// LIFF 初始化（在表單渲染後執行）
if (typeof liff !== 'undefined') {
  initLiff();
}
</script>
</body>
</html>
